{% extends 'base.html' %}
{% block title %}แก้ไขงานแข่งขัน{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>แก้ไขงานแข่งขัน</h1>
    <form method="post">
        <label>ชื่องานแข่งขัน</label>
        <input type="text" name="title" value="{{ tournament['title'] }}" required>

        <label>รายละเอียด</label>
        <textarea name="description" rows="4">{{ tournament['description'] or '' }}</textarea>

        <label class="inline-check">
            <input type="checkbox" name="is_open" {% if tournament['is_open'] %}checked{% endif %}> เปิดรับสมัคร
        </label>

        <button type="submit">บันทึกการแก้ไข</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">กลับ</a>
    </form>
</div>
{% endblock %}
